name: API CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'HealthMate.sln'
      - 'global.json'
      - '.config/dotnet-tools.json'
      - 'docker-compose.yml'
      - 'deploy/**'
      - '.github/workflows/api-ci.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'HealthMate.sln'
      - 'global.json'
      - '.config/dotnet-tools.json'
      - 'docker-compose.yml'
      - 'deploy/**'
      - '.github/workflows/api-ci.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet restore HealthMate.sln
      - run: dotnet build HealthMate.sln --configuration Release --no-restore
      - run: dotnet test HealthMate.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: '**/test-results.trx'

  docker:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: src/HealthMate.Api/Dockerfile
          push: false
          tags: healthmate-api:ci
